<div class="min-h-screen bg-gray-50 p-4 md:p-8">
  <div
    class="max-w-4xl mx-auto bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden"
  >
    <div
      class="p-6 border-b border-gray-100 flex flex-col md:flex-row md:items-center justify-between gap-4"
    >
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Notifications</h1>
        <p class="text-sm text-gray-500 mt-1">
          Realtime updates for likes, comments, shares, and follows.
        </p>
      </div>
      <button
        class="inline-flex items-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
      >
        <svg class="w-4 h-4 me-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 13l4 4L19 7"
          ></path>
        </svg>
        Mark all as read
      </button>
    </div>

    <div class="px-6 py-4 flex gap-2">
      <button class="px-5 py-1.5 text-sm font-semibold rounded-full bg-blue-600 text-white">
        All
      </button>
      <button
        class="px-5 py-1.5 text-sm font-semibold rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200"
      >
        Unread
        <span class="ms-1 bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full text-xs">1</span>
      </button>
    </div>

    <div class="divide-y divide-gray-100">
      @for (notif of notifications;track notif._id) {
      <div class="p-5 flex items-start gap-4 hover:bg-blue-50/30 transition-colors group relative">
        <img
          [src]="notif.actor.photo"
          class="w-12 h-12 rounded-full border border-gray-100 shadow-sm"
          alt="User"
        />

        <div class="flex-1">
          <div class="flex items-center justify-between">
            <p class="text-sm font-semibold text-gray-900">
              {{ notif.actor.name }}
              <span class="font-normal text-gray-600"
                >{{ notif.type.split('_', 1) }} your post</span
              >
            </p>
            <div class="flex items-center gap-2">
              <span class="text-xs text-gray-400">{{ notif.createdAt }}</span>
              @if (!notif.isRead) {
              <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
              }
            </div>
          </div>

          <p class="text-sm text-gray-500 mt-1 italic">"{{ notif.entity.body }}"</p>

          <div class="mt-3 flex items-center gap-3">
            <button class="p-1.5 text-red-500 bg-red-50 rounded-lg hover:bg-red-100">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path
                  d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"
                />
              </svg>
            </button>
            <button
              (click)="markAsRead(notif._id)"
              [disabled]="isRead"
              [class.text-green-400]="isRead"
              [class.text-blue-500]="!isRead"
              class="text-xs font-semibold flex items-center gap-1 hover:underline"
            >
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M5 13l4 4L19 7"></path>
              </svg>
              Mark as read
            </button>
          </div>
        </div>
      </div>
      }
    </div>
  </div>
</div>
